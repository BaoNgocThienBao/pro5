<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - About Me</title>
    <script src="https://kit.fontawesome.com/01d6b0b229.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
    <link rel="stylesheet" href="main.css" />
</head>
<body>
    <main>
        <div class="container">
            <div class="profile-card">
                <div class="card-left">
                    <div class="profile-section">
                        <div class="image-wrapper">
                            <img class="profile-image" src="myface.jpg" alt="Profile Picture">
                        </div>
                        <h1 class="profile-name">About Me</h1>
                        <p class="profile-subtitle">21 years old</p>
                        <p class="profile-description">Vietnamese student at Dong Nai Technology University (DNTU). Passionate about technology and creative projects.</p>
                        
                        <div class="social-links">
                            <a href="https://www.facebook.com/thienbao.baongoc/" class="social-icon facebook" title="Facebook" aria-label="Facebook">
                                <i class="fa-brands fa-facebook"></i>
                            </a>
                            <a href="https://www.instagram.com/kinda.mt/" class="social-icon instagram" title="Instagram" aria-label="Instagram">
                                <i class="fa-brands fa-instagram"></i>
                            </a>
                            <a href="https://twitter.com/YikeBaohere" class="social-icon twitter" title="Twitter" aria-label="Twitter">
                                <i class="fa-brands fa-twitter"></i>
                            </a>
                            <a href="https://www.twitch.tv/trumxebaonhe1" class="social-icon twitch" title="Twitch" aria-label="Twitch">
                                <i class="fa-brands fa-twitch"></i>
                            </a>
                        </div>
                    </div>
                </div>
                
                <div class="card-right">
                    <div class="video-wrapper">
                        <video id="bgVideo" autoplay loop preload="auto" muted>
                            <source src="Music.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                        <div class="video-controls">
                            <button id="playBtn" class="control-btn" title="Play">
                                <i class="fas fa-play"></i>
                            </button>
                            <button id="pauseBtn" class="control-btn" title="Pause">
                                <i class="fas fa-pause"></i>
                            </button>
                            <button id="muteBtn" class="control-btn" title="Mute">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <button id="unmuteBtn" class="control-btn" title="Unmute" style="display:none;">
                                <i class="fas fa-volume-mute"></i>
                            </button>
                            <button id="fullscreenBtn" class="control-btn" title="Fullscreen">
                                <i class="fas fa-expand"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="https://unpkg.com/scrollreveal@4.0.0/dist/scrollreveal.min.js"></script>
    <script>
        // ScrollReveal animations
        ScrollReveal({distance: '60px', duration: 2500, delay: 400});
        ScrollReveal().reveal('.profile-card', {delay: 500, origin: 'bottom'});
        ScrollReveal().reveal('.profile-image', {delay: 600, scale: 0.85});

        // Video control functionality
        const video = document.getElementById('bgVideo');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const muteBtn = document.getElementById('muteBtn');
        const unmuteBtn = document.getElementById('unmuteBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        playBtn.addEventListener('click', () => {
            video.play();
            playBtn.style.display = 'none';
            pauseBtn.style.display = 'flex';
        });

        pauseBtn.addEventListener('click', () => {
            video.pause();
            pauseBtn.style.display = 'none';
            playBtn.style.display = 'flex';
        });

        muteBtn.addEventListener('click', () => {
            video.muted = true;
            muteBtn.style.display = 'none';
            unmuteBtn.style.display = 'flex';
        });

        unmuteBtn.addEventListener('click', () => {
            video.muted = false;
            unmuteBtn.style.display = 'none';
            muteBtn.style.display = 'flex';
        });

        fullscreenBtn.addEventListener('click', () => {
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
        });
    </script>
</body>
</html>
