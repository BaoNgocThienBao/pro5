<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - About Me</title>
    <script src="https://kit.fontawesome.com/01d6b0b229.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
    <link rel="stylesheet" href="main.css" />
</head>
<body>
    <main>
        <div class="container">
            <div class="profile-card">
                <div class="card-left">
                    <div class="profile-section">
                        <div class="image-wrapper">
                            <img class="profile-image" src="myface.jpg" alt="Profile Picture">
                        </div>
                        <h1 class="profile-name">About Me</h1>
                        <p class="profile-subtitle" id="userAge">Loading...</p>
                        <p class="birthday-countdown" id="birthdayCountdown">Loading...</p>
                        <p class="profile-description">Vietnamese student at Dong Nai Technology University (DNTU). Passionate about technology and creative projects.</p>
                        
                        <div class="social-links">
                            <a href="https://www.facebook.com/thienbao.baongoc/" class="social-icon facebook" title="Facebook" aria-label="Facebook">
                                <i class="fa-brands fa-facebook"></i>
                            </a>
                            <a href="https://www.instagram.com/kinda.mt/" class="social-icon instagram" title="Instagram" aria-label="Instagram">
                                <i class="fa-brands fa-instagram"></i>
                            </a>
                            <a href="https://twitter.com/YikeBaohere" class="social-icon twitter" title="Twitter" aria-label="Twitter">
                                <i class="fa-brands fa-twitter"></i>
                            </a>
                            <a href="https://www.twitch.tv/trumxebaonhe1" class="social-icon twitch" title="Twitch" aria-label="Twitch">
                                <i class="fa-brands fa-twitch"></i>
                            </a>
                            <a href="https://www.roblox.com/users/607227985/profile" class="social-icon roblox" title="Roblox" aria-label="Roblox">
                                <img src="roblox_icon.png" alt="Roblox" class="roblox-img">
                            </a>
                        </div>
                    </div>
                </div>
                
                <div class="card-right">
                    <div class="music-widget">
                        <div class="music-thumbnail">
                            <img src="music-thumbnail.jpg" alt="Album Art" class="thumbnail-img">
                        </div>
                        
                        <div class="widget-header">
                            <div class="widget-title">
                                <p class="song-label">Now Playing</p>
                                <p class="song-name">恋は月の蔭に</p>
                            </div>
                            <div class="favorite-btn">
                                <i class="fas fa-heart"></i>
                            </div>
                        </div>
                        
                        <video id="bgVideo" preload="auto" muted style="display:none;">
                            <source src="Music.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>

                        <div class="progress-container">
                            <span class="time-current">0:00</span>
                            <div class="progress-bar">
                                <div class="progress-fill"></div>
                                <input type="range" id="progressSlider" class="slider" min="0" max="100" value="0">
                            </div>
                            <span class="time-duration">0:00</span>
                        </div>

                        <div class="controls-container">
                            <button id="prevBtn" class="control-btn" title="Previous">
                                <i class="fas fa-step-backward"></i>
                            </button>
                            <button id="playBtn" class="control-btn play-btn" title="Play">
                                <i class="fas fa-play"></i>
                            </button>
                            <button id="pauseBtn" class="control-btn play-btn" title="Pause" style="display:none;">
                                <i class="fas fa-pause"></i>
                            </button>
                            <button id="nextBtn" class="control-btn" title="Next">
                                <i class="fas fa-step-forward"></i>
                            </button>
                            <button id="muteBtn" class="control-btn" title="Mute">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <button id="unmuteBtn" class="control-btn" title="Unmute" style="display:none;">
                                <i class="fas fa-volume-mute"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="https://unpkg.com/scrollreveal@4.0.0/dist/scrollreveal.min.js"></script>
    <script src="function.js"></script>
</body>
</html>
